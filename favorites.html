<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>

Favorites

</title>

<script src="https://cdn.tailwindcss.com"></script>

<link
rel="stylesheet"
href="./css/style.css">

</head>

<body>

<nav class="
bg-slate-900
text-white
px-8
py-5
flex
justify-between
items-center
">

<h1 class="text-3xl font-bold">

📚 Book Explorer

</h1>

<div class="space-x-6">

<a
href="index.html"
class="hover:text-yellow-400 transition">

Home

</a>

<a
href="favorites.html"
class="hover:text-yellow-400 transition">

Favorites

</a>

<a
href="about.html"
class="hover:text-yellow-400 transition">

About

</a>

</div>

</nav>
<section class="pageHeader">

<h1>

❤️ Favorite Books

</h1>

<p>

Your saved collection

</p>

</section>

<section class="p-10">

<div
id="favoritesContainer"

class="
grid
grid-cols-1
sm:grid-cols-2
lg:grid-cols-4
gap-8
">

</div>

</section>

<footer>

Book Explorer © 2026

</footer>

<script type="module">

const container =
document.getElementById(
"favoritesContainer"
);

const favorites =
JSON.parse(
localStorage.getItem(
"favorites"
)
)||[];

if(
favorites.length===0
){

container.innerHTML=`

<h2 class="text-2xl">

No favorite books yet

</h2>

`;

}

favorites.forEach(
book=>{

const image=
book.cover_i

?`https://covers.openlibrary.org/b/id/${book.cover_i}-L.jpg`

:"https://via.placeholder.com/200x300";

container.innerHTML += `

<div class="card">

<img
src="${image}"

class="
w-full
h-72
object-cover
">

<div class="p-4">

<h3>

${book.title}

</h3>

</div>

</div>

`;

});

</script>

</body>

</html>
